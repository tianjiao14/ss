function drawConnectors() {
    document.querySelectorAll('.connector-line').forEach(el => el.remove());
    document.querySelectorAll('.match').forEach(m => { m.style.position = 'relative'; m.style.top = '0px'; });

    const brackets = document.querySelectorAll('.bracket');
    brackets.forEach(bracket => {
        const rounds = bracket.querySelectorAll('.round');
        for (let r = 0; r < rounds.length - 1; r++) {
            const matches = rounds[r].querySelectorAll('.match');
            const nextRound = rounds[r+1];
            const nextMatches = nextRound.querySelectorAll('.match');
            
            for (let i = 0; i < matches.length; i += 2) {
                const topMatch = matches[i];
                const bottomMatch = matches[i+1];
                if (!topMatch || !bottomMatch) continue;

                const getMatchCenter = (m) => {
                    const p1 = m.querySelector('[data-slot="top"]');
                    const p2 = m.querySelector('[data-slot="bottom"]');
                    return (p1.offsetTop + p1.offsetHeight + p2.offsetTop) / 2;
                };

                const topMatchCenter = getMatchCenter(topMatch);
                const botMatchCenter = getMatchCenter(bottomMatch);
                const bracketRect = bracket.getBoundingClientRect();
                const topAbsMid = topMatch.getBoundingClientRect().top + topMatchCenter - bracketRect.top;
                const botAbsMid = bottomMatch.getBoundingClientRect().top + botMatchCenter - bracketRect.top;
                const midPointY = (topAbsMid + botAbsMid) / 2;

                const dist = botAbsMid - topAbsMid;
                const lineTop = document.createElement('div');
                lineTop.className = 'connector-line connector-top';
                lineTop.style.top = `${topMatchCenter}px`;
                lineTop.style.height = `${dist / 2}px`;
                topMatch.appendChild(lineTop);

                const lineBottom = document.createElement('div');
                lineBottom.className = 'connector-line connector-bottom';
                lineBottom.style.bottom = 'auto'; 
                lineBottom.style.top = `${botMatchCenter - (dist/2)}px`;
                lineBottom.style.height = `${dist / 2}px`;
                bottomMatch.appendChild(lineBottom);

                const topScores = topMatch.querySelector('.score-inputs');
                if (topScores) {
                    topScores.style.top = 'auto';
                    topScores.style.bottom = (topMatch.getBoundingClientRect().height - topMatchCenter) + 'px';
                    topScores.style.marginBottom = '5px';
                    topScores.style.transform = 'none';
                }

                const bottomScores = bottomMatch.querySelector('.score-inputs');
                if (bottomScores) {
                    bottomScores.style.bottom = 'auto';
                    bottomScores.style.top = `${botMatchCenter}px`;
                    bottomScores.style.marginTop = '5px';
                    bottomScores.style.transform = 'none';
                }

                const nextMatchIdx = Math.floor(i / 2);
                const targetMatch = nextMatches[nextMatchIdx];
                if (targetMatch) {
                    const targetCenter = getMatchCenter(targetMatch);
                    const targetAbsMid = targetMatch.getBoundingClientRect().top + targetCenter - bracketRect.top;
                    const offset = midPointY - targetAbsMid;
                    targetMatch.style.top = `${offset}px`;

                    const targetScores = targetMatch.querySelector('.score-inputs');
                    if (targetScores) {
                        targetScores.style.bottom = 'auto';
                        targetScores.style.top = `${targetCenter}px`;
                        targetScores.style.transform = 'translateY(-50%)'; 
                        targetScores.style.marginTop = '0';
                    }
                }
            }
        }
    });
}

function handleMatchClick(e) {
    if (isEditMode) return; 
    const p = e.target.closest('.participant');
    if (!p || p.classList.contains('unplayed') || p.textContent.trim() === "轮空") return;
    
    const match = p.parentElement;
    if (match.classList.contains('decided')) {
        if(confirm("撤销这场比赛结果？")) resetMatch(match);
        return;
    }

    saveHistory();
    const winner = p;
    const top = match.querySelector('[data-slot="top"]');
    const bottom = match.querySelector('[data-slot="bottom"]');
    const loser = (winner === top) ? bottom : top;
    
    const inputs = match.querySelector('.score-inputs');
    if (inputs) {
        const sTop = inputs.querySelector('.s-top').value.trim();
        const sBottom = inputs.querySelector('.s-bottom').value.trim();
        if (sTop !== '' || sBottom !== '') {
            inputs.style.display = 'none';
            const scoreDisplay = document.createElement('div');
            scoreDisplay.className = 'final-score';
            scoreDisplay.textContent = `${sTop || 0} : ${sBottom || 0}`;
            match.appendChild(scoreDisplay);
        }
    }

    match.classList.add('decided');
    const courtTag = match.querySelector('.court-tag');
    if (courtTag) courtTag.style.display = 'none';
    
    winner.classList.add('winner');
    loser.classList.add('loser');

    let winnerHtml = winner.innerHTML.replace(/[🥇🥈🥉]/g, '').trim();
    let loserHtml = loser.innerHTML.replace(/[🥇🥈🥉]/g, '').trim();

    const bracket = match.closest('.bracket');
    const roundDiv = match.closest('.round');
    
    if (roundDiv && bracket) {
        const r = parseInt(roundDiv.dataset.round);
        const m = parseInt(match.dataset.mid);
        const totalR = bracket.querySelectorAll('.round').length; 
        const nextR = roundDiv.nextElementSibling;
        
        // 晋级主赛程胜者
        if (nextR && nextR.classList.contains('round')) {
            const nextMIdx = Math.floor(m / 2);
            const nextSlot = (m % 2 === 0) ? 'top' : 'bottom';
            const targetMatch = nextR.querySelector(`.match[data-mid="${nextMIdx}"]`);
            if (targetMatch) {
                const targetSlot = targetMatch.querySelector(`[data-slot="${nextSlot}"]`);
                if (targetSlot) { 
                    targetSlot.innerHTML = winnerHtml; 
                    targetSlot.classList.remove('unplayed'); 
                    
                    // 【终极修复】延迟 100 毫秒推送，确保 DOM 上的“待定”已经完全变成真名
                    setTimeout(() => {
                        const nextTag = targetMatch.querySelector('.court-tag');
                        if (nextTag && targetMatch.id) {
                            const courtMatch = nextTag.innerText.match(/(\d+)号场/);
                            if (courtMatch) {
                                pushToCourt(targetMatch.id, parseInt(courtMatch[1]), true);
                            }
                        }
                    }, 100);
                }
            }
        }
        
        if (r === totalR - 1) { winner.innerHTML = '🥇 ' + winnerHtml; loser.innerHTML = '🥈 ' + loserHtml; }

        if (bracket.id !== 'bracket-58') {
            if (r === totalR - 2) updateSlot('bronze', 'unplayed', loserHtml);
            if (r === totalR - 3) updateSlot((m < 2) ? '58_semi_1' : '58_semi_2', 'unplayed', loserHtml);
        } else {
            if (r === 0) updateSlot('78_final', 'unplayed', loserHtml);
        }
    }

    if (match.dataset.type === 'bronze') winner.innerHTML = '🥉 ' + winnerHtml;

    updateStandings();
    saveData(false);
}

function updateSlot(matchType, className, htmlContent) {
    // 🌟 核心修复：改用 data-type 选择器。彻底解决“八强负者”名字无法更新的致命 Bug
    const match = ui.results.querySelector(`.match[data-type="${matchType}"]`);
    if (!match) return;
    for (let s of match.querySelectorAll('.participant')) {
        const txt = s.textContent.trim();
        if (s.classList.contains('unplayed') || txt.includes('待定') || txt.includes('胜者') || txt.includes('负者') || txt.includes('八强')) {
            s.innerHTML = htmlContent;
            s.classList.remove('unplayed');
            
            // 【自动同步】名字落位后，如果该场次已经排了场地，立刻静默推送到裁判端
            setTimeout(() => {
                const tag = match.querySelector('.court-tag, .court-info');
                if (tag && match.id) {
                    const courtMatch = tag.innerText.match(/(\d+)号场/);
                    if (courtMatch) {
                        pushToCourt(match.id, parseInt(courtMatch[1]), true);
                    }
                }
            }, 100);
            break; 
        }
    }
}
function resetMatch(match) {
    if (!match) return;
    const roundDiv = match.closest('.round');
    const bracket = match.closest('.bracket') || document.querySelector('.bracket');
    const totalRounds = bracket ? bracket.querySelectorAll('.round').length : -1;

    if (roundDiv) {
        const r = parseInt(roundDiv.dataset.round);
        const m = parseInt(match.dataset.mid);
        if (match.querySelector('.winner')) {
            const nextR = roundDiv.nextElementSibling;
            if (nextR) {
                const nextMatch = nextR.querySelector(`.match[data-mid="${Math.floor(m / 2)}"]`);
                if (nextMatch) {
                    if (nextMatch.classList.contains('decided')) resetMatch(nextMatch);
                    const targetSlot = nextMatch.querySelector(`[data-slot="${(m % 2 === 0) ? 'top' : 'bottom'}"]`);
                    if (targetSlot) { targetSlot.innerHTML = "待定"; targetSlot.classList.add('unplayed'); }
                }
            }
            handlePlacementReset(r, m, totalRounds, match);
        }
    } else {
        handlePlacementReset(-1, -1, -1, match);
    }
    
    match.classList.remove('decided');
    const courtTag = match.querySelector('.court-tag');
    if (courtTag) courtTag.style.display = 'block';
    match.querySelectorAll('.participant').forEach(p => {
        p.classList.remove('winner', 'loser');
        p.innerHTML = p.innerHTML.replace(/[🥇🥈🥉]/g, '').trim();
    });
    const scoreDisplay = match.querySelector('.final-score');
    if (scoreDisplay) scoreDisplay.remove();
    const inputs = match.querySelector('.score-inputs');
    if (inputs) {
        inputs.style.display = 'flex';
        inputs.style.visibility = 'visible';
        inputs.querySelectorAll('input').forEach(i => i.value = "");
    }
    updateStandings();
    saveData(false);
}

function handlePlacementReset(r, m, totalRounds, match) {
    if (r !== -1 && r === totalRounds - 2) {
        const bronzeMatch = ui.results.querySelector('[data-type="bronze"]');
        if (bronzeMatch) {
            if (bronzeMatch.classList.contains('decided')) resetMatch(bronzeMatch);
            const slotIdx = (m % 2 === 0) ? 0 : 1;
            const slots = bronzeMatch.querySelectorAll('.participant');
            slots[slotIdx].textContent = `半决赛负者${slotIdx + 1}`;
            slots[slotIdx].classList.add('unplayed');
        }
    }
    if (r !== -1 && r === totalRounds - 3) {
        const targetMatch = ui.results.querySelector(`[data-type="${(m < 2) ? '58_semi_1' : '58_semi_2'}"]`);
        if (targetMatch) {
            if (targetMatch.classList.contains('decided')) resetMatch(targetMatch);
            const slots = targetMatch.querySelectorAll('.participant');
            slots[(m % 2 === 0) ? 0 : 1].textContent = "八强负者";
            slots[(m % 2 === 0) ? 0 : 1].classList.add('unplayed');
        }
    }
    if (match.dataset.type === '58_semi_1' || match.dataset.type === '58_semi_2') {
        const final56 = ui.results.querySelector('[data-type="56_final"]');
        const final78 = ui.results.querySelector('[data-type="78_final"]');
        const slotIdx = (match.dataset.type === '58_semi_1') ? 0 : 1;
        [final56, final78].forEach(f => {
            if (f) {
                if (f.classList.contains('decided')) resetMatch(f);
                const s = f.querySelectorAll('.participant')[slotIdx];
                s.textContent = (f === final56) ? "胜者" : "负者";
                s.classList.add('unplayed');
            }
        });
    }
}

function autoAdvanceByes() {
    const round0 = ui.results.querySelector('.round[data-round="0"]');
    if(!round0) return;
    setTimeout(() => {
        round0.querySelectorAll('.match').forEach(m => {
            if (m.classList.contains('decided')) return;
            const top = m.querySelector('[data-slot="top"]');
            const bottom = m.querySelector('[data-slot="bottom"]');
            if (top.textContent === "轮空" && bottom.textContent !== "轮空") {
                bottom.click();
                const inputs = m.querySelector('.score-inputs');
                if(inputs) inputs.style.visibility = 'hidden';
            } else if (bottom.textContent === "轮空" && top.textContent !== "轮空") {
                top.click();
                const inputs = m.querySelector('.score-inputs');
                if(inputs) inputs.style.visibility = 'hidden';
            }
        });
    }, 100);
}

function updateStandings() {
    const t = allTournaments[activeId];
    if (!t) return;

    const cleanName = (name) => {
        if (!name) return "";
        return name.replace(/[🥇🥈🥉]/g, '').replace(/[\(（][A-Z]?\d+[\)）]\s*$/g, '').replace(/^\d+\.\s*/, '').trim();
    };

    let standingsData = [];
    const getRes = (selector) => {
        const m = ui.results.querySelector(selector);
        if (m && m.classList.contains('decided')) {
            const w = m.querySelector('.winner');
            const l = m.querySelector('.loser');
            return { winner: w ? cleanName(w.textContent) : "", loser: l ? cleanName(l.textContent) : "" };
        }
        return null;
    };
    
    const rounds = ui.results.querySelectorAll('.bracket .round');
    if (rounds.length > 0) {
        const finalMatch = rounds[rounds.length - 1].querySelector('.match');
        const res = getRes(`#${finalMatch.id}`); 
        if (res) { standingsData.push({ title: '🥇 冠军', name: res.winner, rank: 1 }); standingsData.push({ title: '🥈 亚军', name: res.loser, rank: 2 }); }
    }
    
    const r34 = getRes('[data-type="bronze"]');
    if (r34) { standingsData.push({ title: '🥉 季军', name: r34.winner, rank: 3 }); standingsData.push({ title: '第四名', name: r34.loser, rank: 4 }); }
    const r56 = getRes('[data-type="56_final"]');
    if (r56) { standingsData.push({ title: '第五名', name: r56.winner, rank: 5 }); standingsData.push({ title: '第六名', name: r56.loser, rank: 6 }); }
    const r78 = getRes('[data-type="78_final"]');
    if (r78) { standingsData.push({ title: '第七名', name: r78.winner, rank: 7 }); standingsData.push({ title: '第八名', name: r78.loser, rank: 8 }); }

    if (t.type === 'round-robin') {
        ui.results.querySelectorAll('.crosstable').forEach((table) => {
            table.querySelectorAll('tbody tr').forEach(row => {
                const rankVal = row.cells[row.cells.length - 1].innerText.trim();
                if (rankVal && !isNaN(rankVal)) {
                    let titleText = `第${rankVal}名`;
                    if (rankVal == 1) titleText = '🥇 冠军';
                    if (rankVal == 2) titleText = '🥈 亚军';
                    if (rankVal == 3) titleText = '🥉 季军';
                    if (rankVal == 4) titleText = '第四名';
                    if (rankVal == 5) titleText = '第五名';
                    if (rankVal == 6) titleText = '第六名';
                    if (rankVal == 7) titleText = '第七名';
                    if (rankVal == 8) titleText = '第八名';
                    standingsData.push({ title: titleText, name: cleanName(row.cells[0].innerText), rank: parseInt(rankVal) });
                }
            });
        });
    }

    let cont = document.getElementById('final-standings-container');
    if (standingsData.length === 0) { if (cont) cont.style.display = 'none'; return; }

    if (!cont) {
        cont = document.createElement('div');
        cont.id = 'final-standings-container';
        cont.style.textAlign = 'center';
        cont.style.backgroundColor = '#f4f6f8';
        cont.style.padding = '40px 20px';
        cont.style.borderRadius = '12px';
        cont.style.marginTop = '50px';
        cont.innerHTML = `<h2 style="color: #27ae60; font-size: 28px; margin-bottom: 30px; font-weight: bold;">🏆 最终名次 🏆</h2><ul class="standings-list" style="list-style: none; padding: 0; margin: 0 auto; display: inline-block;"></ul>`;
    }

    const ul = cont.querySelector('.standings-list');
    standingsData.sort((a, b) => a.rank - b.rank);
    
    ul.innerHTML = standingsData.map(item => `
        <li style="padding: 16px 20px; border-bottom: 1px dashed #dcdfe6; font-size: 16px; display: flex; align-items: center; justify-content: flex-start; min-width: 350px;">
            <div style="color: #27ae60; font-weight: bold; width: 100px; text-align: left; font-size: 18px;">${item.title}</div>
            <div style="color: #333; text-align: left; flex: 1;">${item.name}</div>
        </li>
    `).join('');

    const lastLi = ul.querySelector('li:last-child');
    if(lastLi) lastLi.style.borderBottom = 'none';

    cont.style.display = 'block';
    ui.results.appendChild(cont); 
}

function renderGroupStage(players, title, isMixed) {
    const type = isMixed ? 'mixed' : 'round-robin';
    const count = players.length;
    const winPts = document.getElementById('pts-win')?.value || 3;
    const drawPts = document.getElementById('pts-draw')?.value || 1;
    const lossPts = document.getElementById('pts-loss')?.value || 0;

    let numGroups = 1; 
    if (isMixed) {
        const manualGroups = parseInt(document.getElementById('num-groups')?.value);
        if (!isNaN(manualGroups) && manualGroups > 0) numGroups = manualGroups;
        else {
            if (count >= 4) {
                let autoGroups = 1;
                while ((autoGroups * 2) * 3 <= count) autoGroups *= 2;
                if (autoGroups === 1 && count >= 4) autoGroups = 2;
                numGroups = autoGroups;
            }
        }
    }

    const getUnit = (name) => { const m = name.match(/[\(（](.*?)[\)）]/); return m ? m[1].trim() : "个人"; };

    let seedUnits = {}, otherUnits = {};
    players.forEach(p => {
        const unit = getUnit(p);
        const isSeed = /[\(（]\d+[\)）]\s*$/.test(p);
        const targetMap = isSeed ? seedUnits : otherUnits;
        if (!targetMap[unit]) targetMap[unit] = [];
        targetMap[unit].push(p);
    });

    const groups = Array.from({ length: numGroups }, () => []);
    let currentGroupIndex = 0;
    const distribute = (unitMap) => {
        const uNames = Object.keys(unitMap).sort(() => 0.5 - Math.random());
        uNames.forEach(u => {
            const members = unitMap[u].sort(() => 0.5 - Math.random());
            members.forEach(player => {
                groups[currentGroupIndex % numGroups].push(player);
                currentGroupIndex++;
            });
        });
    };
    distribute(seedUnits);
    distribute(otherUnits);
    groups.forEach(g => g.sort(() => 0.5 - Math.random()));

   let html = `<div class="container">
        <h2 class="result-title">${title} - ${isMixed ? '第一阶段：小组赛' : '循环赛积分表'}</h2>
        <p style="text-align:center; color:#666; font-size:13px; margin-top:-20px; margin-bottom:20px;">
            计分规则：胜 ${winPts} / 平 ${drawPts} / 负 ${lossPts}
        </p>
    </div>`;
    
    groups.forEach((group, index) => {
        const isSingleGroup = groups.length === 1;
        const groupName = isSingleGroup ? "全组" : `${String.fromCharCode(65 + index)} 组`;
        let groupHtml = `<div class="group-container container" data-group-index="${index}"><h3>${groupName} 积分表</h3>`;
        
       const headerCols = group.map((p, i) => `<th data-name="${p}">${i+1}. ${formatDisplayName(p)}</th>`).join('');
        const bodyRows = group.map((player, rIdx) => {
            const cells = group.map((_, cIdx) => rIdx === cIdx ? '<td class="diagonal"></td>' : '<td contenteditable="true"></td>').join('');
            return `<tr><th class="player-header" data-name="${player}">${rIdx+1}. ${formatDisplayName(player)}</th>${cells}<td contenteditable="true"></td><td contenteditable="true"></td><td contenteditable="true"></td></tr>`;
        }).join('');
        
        groupHtml += `<table class="data-table crosstable">
            <thead><tr><th>${isSingleGroup?'':String.fromCharCode(65+index)}</th>${headerCols}<th>积分</th><th>净胜</th><th>名次</th></tr></thead>
            <tbody>${bodyRows}</tbody></table>`;
        
        if (isMixed) {
            const advanceCount = parseInt(document.getElementById('num-advance-per-group')?.value) || 2;
            let selectHtml = '';
            for (let i = 1; i <= advanceCount; i++) {
                let options = `<option value="">--待定--</option>` + group.map(p => `<option value="${p}">${p}</option>`).join('');
                selectHtml += `<div style="flex:1;"><label>第 ${i} 名</label><select class="rank-select rank-${i}" onchange="syncMixedBracket()">${options}</select></div>`;
            }
            groupHtml += `<div class="qualification-box" style="background:#fdf6ec; padding:15px; margin-top:15px; border-radius:4px; border:1px solid #faecd8;">
                <div style="font-weight:bold; color:#e6a23c; margin-bottom:10px;">🏆 ${groupName} 出线确认</div>
                <div style="display:flex; gap:10px; flex-wrap:wrap;">${selectHtml}</div>
            </div>`;
        }

        groupHtml += `<h3 style="margin-top: 30px;">${groupName} 对阵日程</h3>`;
        let gp = group.map((name, idx) => ({ name: name, pindex: idx + 1 })); 
        if (gp.length % 2 !== 0) gp.push({ name: '轮空', pindex: -1 });
        
        const numRounds = gp.length - 1;
        let schedule = Array.from({length: numRounds}, () => []);
        let tempGp = [...gp];
        
        for (let r = 0; r < numRounds; r++) {
            for (let i = 0; i < tempGp.length / 2; i++) {
                const p1 = tempGp[i], p2 = tempGp[tempGp.length - 1 - i];
                
                // 🌟 绝对拦截器：只要对手是“轮空”，就不往赛程表里写数据，彻底隐身！
                if (p1.name !== '轮空' && p2.name !== '轮空') {
                    schedule[r].push(`
                        <div style="display:flex; justify-content:center; align-items:center; gap:8px;">
                            <div class="p-name" data-realname="${p1.name}" data-idx="${p1.pindex}" style="display:flex; flex-direction:column; align-items:center; line-height:1.2;">${formatDisplayName(p1.name)}</div>
                            <div style="font-size:12px; color:#999; font-weight:bold;">VS</div>
                            <div class="p-name" data-realname="${p2.name}" data-idx="${p2.pindex}" style="display:flex; flex-direction:column; align-items:center; line-height:1.2;">${formatDisplayName(p2.name)}</div>
                        </div>
                    `);
                }
            }
            tempGp.splice(1, 0, tempGp.pop()); 
        }
        
        const maxMatches = Math.max(0, ...schedule.map(r => r.length));
        let schedHtml = `<table class="data-table schedule-table"><thead><tr>${Array.from({length: numRounds}, (_, i) => `<th>第 ${i+1} 轮</th>`).join('')}</tr></thead><tbody>`;
        for (let i = 0; i < maxMatches; i++) {
            schedHtml += `<tr>`;
            for (let r = 0; r < numRounds; r++) {
                const matchCellId = `${activeId}_rr-${index}-${r}-${i}`; 
        schedHtml += `<td id="${matchCellId}">${schedule[r][i] || ''}</td>`;
    }
            schedHtml += `</tr>`;
        }
        schedHtml += '</tbody></table>';
        groupHtml += schedHtml + '</div>';
        html += groupHtml;
    });

    if (isMixed) {
        html += `
        <div id="mixed-ko-section">
            <div id="mixed-ko-content"></div>
        </div>`;
     
setTimeout(() => { prepareMixedBracketPlaceholder(); }, 50);
    }
    return html; 
}

       bracketList = ["[A组第1]", "[B组第2]", "[C组第1]", "[D组第2]", "[D组第1]", "[C组第2]", "[B组第1]", "[A组第2]"];

       setTimeout(() => {

function syncMixedBracket() {
    let nameMap = {};
    document.querySelectorAll('.group-container').forEach((container, gIdx) => {
        const groupLetter = String.fromCharCode(65 + gIdx);
        for (let r = 1; r <= 8; r++) {
            const sel = container.querySelector(`.rank-${r}`);
            if (sel) nameMap[`[${groupLetter}组第${r}]`] = sel.value;
        }
    });

    document.querySelectorAll('#mixed-ko-content .participant').forEach(slot => {
        const placeholder = slot.getAttribute('data-placeholder');
       if (placeholder && nameMap[placeholder] !== undefined) {
            const realName = nameMap[placeholder];
            const oldHtml = slot.innerHTML; // 记录更新前的名字
            
            if (realName) {
                slot.innerHTML = formatDisplayName(realName);
                slot.classList.remove('unplayed');
            } else {
                slot.innerHTML = placeholder; 
                slot.classList.add('unplayed');
            }
            
            // 🌟 核心自动推送：如果占位符变成了真名，且该场次已经排了场地，则静默更新裁判端
            if (slot.innerHTML !== oldHtml) {
                const matchNode = slot.closest('.match');
                if (matchNode && matchNode.id) {
                    const tag = matchNode.querySelector('.court-tag');
                    if (tag) {
                        const courtMatch = tag.innerText.match(/(\d+)号场/);
                        if (courtMatch) {
                            setTimeout(() => { 
                                pushToCourt(matchNode.id, parseInt(courtMatch[1]), true); 
                            }, 50);
                        }
                    }
                }
            }
        }
    });
    autoAdvanceByes();
}

function timeToMins(timeStr) {
    let [h, m] = timeStr.split(':').map(Number);
    return h * 60 + m;
}

function minsToTime(mins) {
    let h = Math.floor(mins / 60) % 24;
    let m = mins % 60;
    return `${String(h).padStart(2, '0')}:${String(m).padStart(2, '0')}`;
}

/**
 * 提取当前页面中所有待办比赛场次
 * 包含：小组循环赛、淘汰赛主赛程、排名赛
 * 核心：为每场比赛注入 totalRounds 以支持“长路径优先”编排
 */
function collectMatchesFromElement(root) {
    let queue = [];
    
    // 1. 提取小组循环赛 (Round Robin)
    root.querySelectorAll('.group-container').forEach(container => {
        const table = container.querySelector('.schedule-table');
        const crosstable = container.querySelector('.crosstable');
        if (!table || !crosstable) return;

        // 获取该小组的所有选手列表（用于匹配积分表中的完赛状态）
       const players = Array.from(crosstable.querySelectorAll('th.player-header')).map(getRealName);
        
        // 获取该小组赛的总轮次
        const maxRounds = table.querySelectorAll('thead th').length;

        for (let r = 0; r < maxRounds; r++) {
            table.querySelectorAll('tbody tr').forEach(row => {
                const cell = row.cells[r];
                // 排除空单元格、轮空场次
                    if (cell && cell.textContent.trim() !== "" && !cell.textContent.includes('轮空')) {
                    let p1Name, p2Name;
                    const pNames = cell.querySelectorAll('.p-name');
                    if (pNames.length >= 2) {
                        p1Name = pNames[0].getAttribute('data-realname') || pNames[0].innerText.replace(/\s*\n\s*/g, '').trim();
                        p2Name = pNames[1].getAttribute('data-realname') || pNames[1].innerText.replace(/\s*\n\s*/g, '').trim();
                    } else {
                        const names = cell.innerText.split(' VS ').map(n => n.trim());
                        p1Name = names[0]; p2Name = names[1];
                    }
                    const idxA = players.indexOf(p1Name);
                    const idxB = players.indexOf(p2Name);
                    
                    // 检查积分表中对应单元格是否有 <strong> 标签（代表已录入比分/已完赛）
                    let isPlayed = (idxA !== -1 && idxB !== -1 && crosstable.rows[idxA + 1]?.cells[idxB + 1]?.querySelector('strong'));
                    
                    if (!isPlayed) {
                        queue.push({ 
                            node: cell, 
                            type: 'rr', 
                            round: r, 
                            totalRounds: maxRounds // 注入总轮次用于优先级排序
                        });
                    }
                }
            });
        }
    });

    // 2. 提取淘汰赛主赛程 (Main Bracket)
    // 排除掉 ID 包含 "58" 的排名赛容器，避免重复提取
    const mainBracket = root.querySelector('.bracket:not([id*="58"])');
    if (mainBracket) {
        const koRounds = mainBracket.querySelectorAll('.round');
        const totalKoRounds = koRounds.length;
        
        koRounds.forEach((round, rIdx) => {
            round.querySelectorAll('.match').forEach(m => {
                // 排除已决定胜负的场次
                if (m.classList.contains('decided')) return; 

                // 决赛 (最后一轮) 给予特殊的 999 权重，确保最后进行
                let weight = (rIdx === totalKoRounds - 1) ? 999 : rIdx;
                
                queue.push({ 
                    node: m, 
                    type: 'ko', 
                    round: weight, 
                    totalRounds: totalKoRounds // 注入总轮次
                });
            });
        });
    }

    // 3. 提取 3-4 名及 5-8 名排名赛
    root.querySelectorAll('.placement-block .match').forEach(m => {
        if (m.classList.contains('decided')) return;
        
        const type = m.getAttribute('data-type');
        let weight = 300; // 排名赛基础轮次权重
        let projectTotalRounds = 3; // 排名赛通常视为较短路径

        // 精细化权重：决赛类场次稍后排
        if (type === '56_final' || type === '78_final') {
            weight = 310;
        } else if (type === 'bronze') {
            weight = 400; // 3-4名决赛通常较晚
        }
        
        queue.push({ 
            node: m, 
            type: 'ko', 
            round: weight, 
            totalRounds: projectTotalRounds 
        });
    });

    return queue;
}
/**
 * 完整版赛事智能编排逻辑（硬性隔离版）
 * 逻辑：所有小组赛(RR)执行完 -> 整体停顿 -> 开启淘汰赛(KO)
 */
function applySchedulingLogic(matchQueue, inputId) {
    const numCourts = parseInt(document.getElementById(inputId).value) || 5;
    const duration = parseInt(document.getElementById('global-duration').value) || 20;
    
    // 1. 读取时间配置（支持不限时设置）
    const morningStartStr = document.getElementById('global-start-time').value;
    const morningStart = morningStartStr ? timeToMins(morningStartStr) : timeToMins("09:00");
    const morningEnd = document.getElementById('morning-end-time').value ? timeToMins(document.getElementById('morning-end-time').value) : Infinity;
    const afternoonStart = document.getElementById('afternoon-start-time').value ? timeToMins(document.getElementById('afternoon-start-time').value) : Infinity;
    const afternoonEnd = document.getElementById('afternoon-end-time').value ? timeToMins(document.getElementById('afternoon-end-time').value) : Infinity;

    // 2. 核心排序：类型第一（RR在前，KO在后），压力值（长路径）第二
    matchQueue.sort((a, b) => {
        // 第一优先级：类型 (rr 永远在 ko 之前)
        if (a.type === 'rr' && b.type === 'ko') return -1;
        if (a.type === 'ko' && b.type === 'rr') return 1;

        // 第二优先级：决赛 (round 999) 必须最后
        if (a.round === 999 && b.round !== 999) return 1;
        if (a.round !== 999 && b.round === 999) return -1;

        // 第三优先级：长路径优先（剩余轮次多的项目先插空）
        const weightA = (a.totalRounds || 0) - a.round;
        const weightB = (b.totalRounds || 0) - b.round;
        if (weightA !== weightB) return weightB - weightA;

        return a.round - b.round;
    });
    
    // 3. 状态初始化
    let currentDay = 0;
    let courtUsage = new Array(numCourts).fill(morningStart);
    let playerBusyUntil = {}; 
    let maxRRFinishTime = 0; // 🌟 关键：记录所有小组赛的全局最晚结束时间

    matchQueue.forEach((match) => {
        // 4. 提取球员名单以检查冲突
        let p1 = "", p2 = "";
        if (match.type === 'ko') {
            const t = match.node.querySelector('[data-slot="top"]');
            const b = match.node.querySelector('[data-slot="bottom"]');
            p1 = t ? t.innerText.trim() : "";
            p2 = b ? b.innerText.trim() : "";
        } else {
            const nameSpans = match.node.querySelectorAll('.p-name');
            if (nameSpans.length >= 2) {
                p1 = nameSpans[0].innerText.trim();
                p2 = nameSpans[1].innerText.trim();
            }
        }

        const getReadyTime = (name) => {
            if (!name || name === "待定" || name === "轮空") return 0;
            return playerBusyUntil[name] || 0;
        };
        const playersReadyAt = Math.max(getReadyTime(p1), getReadyTime(p2));

        // 5. 计算开始时间
        let bestCourtIdx = 0;
        let earliestStartPossible = Infinity;

        for (let i = 0; i < numCourts; i++) {
            // 🌟 核心修改点：
            // 如果是淘汰赛(ko)，它的开始时间必须 >= 场馆空闲, >= 球员打完, 且必须 >= 所有小组赛结束的时间
            let possibleStart = Math.max(courtUsage[i], playersReadyAt);
            if (match.type === 'ko') {
                possibleStart = Math.max(possibleStart, maxRRFinishTime);
            }

            if (possibleStart < earliestStartPossible) {
                earliestStartPossible = possibleStart;
                bestCourtIdx = i;
            }
        }

        let startTime = earliestStartPossible;

        // 决赛逻辑
        if (match.round === 999) startTime = Math.max(startTime, ...courtUsage);

        // 6. 拦截器：午休与跨天
        if (morningEnd !== Infinity && afternoonStart !== Infinity) {
            if (startTime + duration > morningEnd && startTime < afternoonStart) {
                startTime = afternoonStart;
            }
        }
        if (afternoonEnd !== Infinity && startTime + duration > afternoonEnd) {
            currentDay++;
            courtUsage = new Array(numCourts).fill(morningStart);
            playerBusyUntil = {};
            startTime = morningStart; 
            maxRRFinishTime = 0; // 新的一天，重置标记
            bestCourtIdx = 0;
        }

        // 7. 渲染结果
        const timeStr = minsToTime(startTime);
        const dayPrefix = currentDay > 0 ? `D${currentDay + 1} ` : ""; 
        const courtNum = bestCourtIdx + 1;
        const color = ROUND_COLORS[match.round % ROUND_COLORS.length] || '#27ae60';

        if (match.type === 'ko') {
            let tag = match.node.querySelector('.court-tag') || document.createElement('div');
            tag.className = 'court-tag';
            tag.style.backgroundColor = color;
            tag.innerHTML = `${dayPrefix}${timeStr} | ${courtNum}号场 <span style="cursor:pointer; margin-left:5px; border-left:1px solid #fff; padding-left:5px;" onclick="event.stopPropagation(); pushToCourt('${match.node.id}', ${courtNum})">⚡推送</span>`;
            match.node.appendChild(tag);
        } else {
            let info = match.node.querySelector('.court-info') || document.createElement('span');
            info.className = 'court-info';
            info.style.color = color;
            info.innerHTML = `<br>${dayPrefix}${timeStr} ${courtNum}号场`;
            match.node.appendChild(info);
        }

        // 8. 更新全局状态
        const finishTime = startTime + duration;
        courtUsage[bestCourtIdx] = finishTime;
        
        // 🌟 关键：如果是小组赛，更新全局最晚结束时间
        if (match.type === 'rr') {
            maxRRFinishTime = Math.max(maxRRFinishTime, finishTime);
        }

        if (p1 && p1 !== "待定" && p1 !== "轮空") playerBusyUntil[p1] = finishTime;
        if (p2 && p2 !== "待定" && p2 !== "轮空") playerBusyUntil[p2] = finishTime;
    });
}
function assignGlobalCourts(inputId) {
    const courtInput = document.getElementById(inputId);
    const numCourts = parseInt(courtInput.value) || 5;

    if (socket && socket.connected) {
        socket.emit('update_config', { maxCourts: numCourts });
        socket.emit('update_max_courts', numCourts);
    }
    if (!activeId) { alert("请先从左侧菜单选中一个项目再进行编排"); return; }
    
    const matches = collectMatchesFromElement(ui.results);
    if (matches.length === 0) { alert("当前项目暂无待办场次"); return; }

    if (!confirm(`找到 ${matches.length} 场待办比赛，准备按 ${numCourts} 片场地进行智能排程？`)) return;

    matches.forEach(m => {
        const oldTag = m.node.querySelector('.court-tag, .court-info');
        if (oldTag) oldTag.remove();
    });

    applySchedulingLogic(matches, inputId);
    saveData(false);
    alert(`✅ 编排完成！场地数已同步至所有裁判端。`);
}
async function assignEverythingGlobal(inputId) {
    const ids = Object.keys(allTournaments);
    if (ids.length === 0) return;
    let masterQueue = [];
    const parser = new DOMParser();

    for (let id of ids) {
        const doc = parser.parseFromString(allTournaments[id].html, 'text/html');
        doc.querySelectorAll('.court-tag, .court-info').forEach(el => el.remove());
        
        const projectMatches = collectMatchesFromElement(doc);
        projectMatches.forEach(m => {
            m.projectId = id; 
            m.docFragment = doc;
            masterQueue.push(m);
        });
    }

    if (masterQueue.length === 0) { alert("所有比赛项目均已完成，无待办场次。"); return; }
    
    applySchedulingLogic(masterQueue, inputId);

    for (let id of ids) {
        const firstMatch = masterQueue.find(m => m.projectId === id);
        if (firstMatch) {
            allTournaments[id].html = firstMatch.docFragment.body.innerHTML;
            await dbMgr.put(allTournaments[id]);
        }
    }
    
    if (activeId) setActive(activeId); 
    alert("全项目总编排大功告成！已遵循轮次顺序且决赛最后进行。");
}

function saveHistory() {
    const currentState = ui.results.innerHTML;
    if (historyStack.length === 0 || historyStack[historyStack.length - 1] !== currentState) {
        historyStack.push(currentState);
        if (historyStack.length > MAX_HISTORY) historyStack.shift();
    }
}

function undoLastAction() {
    if (historyStack.length === 0) { alert("没有更多可以撤销的操作了"); return; }
    const lastState = historyStack.pop();
    ui.results.innerHTML = lastState;
    if (document.querySelector('.bracket')) drawConnectors();
    if (activeId) allTournaments[activeId].html = lastState;
    updateStandings(); 
    saveData(false);
}

function handleTableInput(e) {
    const cell = e.target;
    if (cell.tagName !== 'TD' || !cell.isContentEditable || !cell.closest('.crosstable')) return;
    const row = cell.parentElement;
    const table = row.parentElement.parentElement;
    const rowIndex = row.rowIndex; 
    const colIndex = cell.cellIndex; 
    const totalCols = table.rows[0].cells.length;
    if (colIndex > totalCols - 4) return; 
    
    const val = cell.innerText.trim();
    const match = val.match(/^(\d+)\s*([:：\-\s])\s*(\d+)([\s\S]*)$/);
    
    if (match) {
        const s1 = match[1], sep = match[2], s2 = match[3], details = match[4].trim(); 
        let mirrorDetails = "";
        if (details) mirrorDetails = details.replace(/(\d+)\s*([:：\-\s])\s*(\d+)/g, "$3$2$1");
        let html = `<strong>${s2}${sep}${s1}</strong>`;
        if (mirrorDetails) html += `<br><span style="font-size:12px; color:#888; display:block; line-height:1.2;">${mirrorDetails}</span>`;
        if (table.rows[colIndex] && table.rows[colIndex].cells[rowIndex]) {
            const mirrorCell = table.rows[colIndex].cells[rowIndex];
            if (mirrorCell.innerHTML !== html) mirrorCell.innerHTML = html;
        }
    } else if (val === "") {
         if (table.rows[colIndex] && table.rows[colIndex].cells[rowIndex]) {
            const mirrorCell = table.rows[colIndex].cells[rowIndex];
            if (mirrorCell.innerText !== "") mirrorCell.innerHTML = "";
        }
    }
}

function handleTableBlur(e) {
    const cell = e.target;
    if (cell.tagName !== 'TD' || !cell.isContentEditable || !cell.closest('.crosstable')) return;
    
    saveHistory();
    
    const colIndex = cell.cellIndex;
    const totalCols = cell.parentElement.cells.length;
    if (colIndex >= totalCols - 3) {
        saveData(false);
        return;
    }

    const val = cell.innerText.trim();
    // 【核心修复】修改正则表达式，捕获大比分后面的所有内容（详细比分）
    const match = val.match(/^(\d+)\s*[:：\-\s]\s*(\d+)([\s\S]*)$/); 
    if (match) {
        const s1 = match[1], s2 = match[2], details = match[3].trim();
        let html = `<strong>${s1}:${s2}</strong>`;
        
        // 如果原本就有详细比分（details），重新封装并保留它
        if (details) {
            html += `<br><span style="font-size:12px; color:#888; display:block; line-height:1.2; margin-top:2px;">${details}</span>`;
        }
        cell.innerHTML = html;
    }
    const table = cell.closest('.crosstable');
    calculateGroupStandings(table); 
    updateStandings();
    saveData(false);
}
function calculateGroupStandings(table) {
    const rows = Array.from(table.querySelectorAll('tbody tr'));
    const winPts = document.getElementById('pts-win') ? parseInt(document.getElementById('pts-win').value) : 3;
    const drawPts = document.getElementById('pts-draw') ? parseInt(document.getElementById('pts-draw').value) : 1;
    const lossPts = document.getElementById('pts-loss') ? parseInt(document.getElementById('pts-loss').value) : 0;
    
    let stats = [];
    let anyMatchPlayed = false; 

    rows.forEach((row, rowIndex) => {
        let totalPts = 0, totalNet = 0;
        const playerName = getRealName(row.cells[0]);
        let hasPlayed = false; // 新增：标记该选手是否有已完成的比赛

        for (let j = 1; j < row.cells.length - 3; j++) {
            const cellText = row.cells[j].innerText.trim();
            const scoreMatch = cellText.match(/^(\d+)\s*[:：\-\s]\s*(\d+)/);
            if (scoreMatch) {
                anyMatchPlayed = true; 
                hasPlayed = true; 
                const s1 = parseInt(scoreMatch[1]), s2 = parseInt(scoreMatch[2]);
                if (s1 > s2) totalPts += winPts;
                else if (s1 === s2) totalPts += drawPts;
                else totalPts += lossPts;
                totalNet += (s1 - s2);
            }
        }

        // 修改点：如果未参赛，积分和净胜球显示为空字符串而不是 0
        row.cells[row.cells.length - 3].innerText = hasPlayed ? totalPts : "";
        row.cells[row.cells.length - 2].innerText = hasPlayed ? totalNet : "";
        
        stats.push({ row: row, name: playerName, pts: totalPts, net: totalNet, hasPlayed: hasPlayed });
    });

    const groupContainer = table.closest('.group-container');

    // 修改点：如果全组都没有比赛，名次显示为空
    if (!anyMatchPlayed) {
        stats.forEach(item => {
            item.row.cells[item.row.cells.length - 1].innerText = ""; 
        });
        if (groupContainer) {
            groupContainer.querySelectorAll('.rank-select').forEach(sel => sel.value = "");
        }
        syncMixedBracket();
        saveData(false);
        return; 
    }

    // 仅对已录入成绩的选手进行排名
    const sorted = stats.filter(s => s.hasPlayed).sort((a, b) => { 
        if (b.pts !== a.pts) return b.pts - a.pts; 
        return b.net - a.net; 
    });
    
    // 初始化名次列为空
    stats.forEach(s => s.row.cells[s.row.cells.length - 1].innerText = "");

    let currentRank = 1;
    sorted.forEach((item, index) => {
        if (index > 0 && item.pts === sorted[index - 1].pts && item.net === sorted[index - 1].net) {
            // 并列逻辑保持不变
        } else {
            currentRank = index + 1;
        }
        
        item.row.cells[item.row.cells.length - 1].innerText = currentRank;
        
        if (groupContainer) {
            const select = groupContainer.querySelector(`.rank-${index + 1}`);
            if (select) {
                for (let option of select.options) {
                    if (option.value === item.name) { select.value = option.value; break; }
                }
            }
        }
    });
    
    syncMixedBracket(); 
    saveData(false);
}
function toggleEditNamesMode() {
    isEditMode = !isEditMode;
    const btn = document.getElementById('toggle-edit-names-btn');
    const allTargets = document.querySelectorAll('.participant:not(.winner):not(.loser), .crosstable th.player-header');
    
    if (isEditMode) {
        btn.textContent = "✅ 完成修正";
        btn.style.backgroundColor = "#f56c6c";
        nameChangeTracker = []; 
        allTargets.forEach(el => {
            const txt = el.innerText.trim();
            if (txt !== "轮空" && txt !== "" && !/^\d+\.$/.test(txt)) {
                nameChangeTracker.push({ el: el, originalText: txt });
                el.contentEditable = "true"; el.style.outline = "2px dashed #409eff"; el.style.backgroundColor = "#fffbe6"; el.style.cursor = "text";
            }
        });
    } else {
        btn.textContent = "✏️ 修正名单";
        btn.style.backgroundColor = "#67c23a";
        nameChangeTracker.forEach(item => {
            const newText = item.el.innerText.trim();
            if (newText !== item.originalText) { if (item.el.closest('.crosstable')) syncGroupStageNames(item.el, item.originalText, newText); }
            item.el.contentEditable = "false"; item.el.style.outline = "none"; item.el.style.backgroundColor = ""; item.el.style.cursor = "pointer";
        });
        refreshQualificationSelects(); 
        saveData(false); 
    }
}

function syncGroupStageNames(targetEl, oldFullText, newFullText) {
    const groupContainer = targetEl.closest('.group-container');
    if (!groupContainer) return;

    // 1. 严格提取选手序号 (例如从 "4. 杨紫逸晨" 中提取 "4")
    const matchOrder = oldFullText.match(/^(\d+)\.\s*/);
    if (!matchOrder) return;
    const playerIndex = matchOrder[1]; 

    // 2. 提取纯净的新名字
    const cleanNew = newFullText.replace(/^\d+\.\s*/, '').trim();
    
    // 3. 同步积分表中的所有表头 (只看序号，不看名字)
    const table = groupContainer.querySelector('.crosstable');
    const allHeaders = table.querySelectorAll('th');
    allHeaders.forEach(h => {
        // 只要序号匹配 (例如 data-name 对应或文本开头匹配)，就更新
        if (h.innerText.startsWith(playerIndex + '.')) {
            h.setAttribute('data-name', cleanNew);
            h.innerHTML = `${playerIndex}. ${formatDisplayName(cleanNew)}`;
        }
    });

    // 4. 精确更新对阵日程表 (【关键】只通过 data-idx 匹配)
    const scheduleNodes = groupContainer.querySelectorAll('.schedule-table .p-name');
    scheduleNodes.forEach(node => {
        const nodeIdx = node.getAttribute('data-idx');
        if (nodeIdx === playerIndex) {
            node.setAttribute('data-realname', cleanNew);
            // 重新渲染显示，并保持你之前的 Flex 垂直排版样式
            node.innerHTML = formatDisplayName(cleanNew);
            node.style.display = 'flex';
            node.style.flexDirection = 'column';
            node.style.alignItems = 'center';
            node.style.lineHeight = '1.2';
        }
    });

    // 5. 同步更新下方的出线下拉框
    const selects = groupContainer.querySelectorAll('select.rank-select');
    selects.forEach(sel => {
        for (let opt of sel.options) {
            if (opt.value === oldFullText.replace(/^\d+\.\s*/, '').trim()) {
                opt.value = cleanNew;
                opt.text = cleanNew;
            }
        }
    });
}
function refreshQualificationSelects() {
    const groups = document.querySelectorAll('.group-container');
    groups.forEach(group => {
        const latestNames = Array.from(group.querySelectorAll('.crosstable th.player-header')).map(getRealName);
        const selects = group.querySelectorAll('select.rank-select');
        selects.forEach(sel => {
            const currentVal = sel.value;
            sel.innerHTML = `<option value="">--请选择--</option>` + latestNames.map(name => `<option value="${name}">${name}</option>`).join('');
            sel.value = currentVal; 
        });
    });
}
/**
 * 终极版成绩册导出：防漏查、抗换行干扰
 */
function exportResultBook() {
    const ids = Object.keys(allTournaments);
    if (ids.length === 0) {
        alert("暂无项目数据！");
        return;
    }

    const tournamentTitle = document.getElementById('global-tournament-title').value || "赛事成绩册";
    
    const parser = new DOMParser();
    
   let bookHtml = `
        <div id="result-book-print-view" style="padding: 20px; font-family: 'SimSun', serif;">
            <div style="page-break-after: always;">
                <h1 style="text-align: center; font-size: 32px; margin-bottom: 30px;">${tournamentTitle}</h1>
                <h2 style="text-align: center; font-size: 24px; margin-bottom: 40px;">成绩总榜单</h2>
    `;

ids.forEach(id => {
        const t = allTournaments[id];
        const doc = parser.parseFromString(t.html, 'text/html');
        
        let extractedStandings = [];

        // 🔍 策略 1：先尝试从底部的“最终名次”大榜列表提取
        const standingsItems = doc.querySelectorAll('.standings-list li');
        if (standingsItems.length > 0) {
            standingsItems.forEach(li => {
                extractedStandings.push({
                    rank: li.querySelector('div:first-child')?.innerText.trim() || "",
                    fullName: li.querySelector('div:last-child')?.innerText.trim() || ""
                });
            });
        } 
        // 🔍 策略 2：如果没有大榜列表，直接从积分表中强行抓取
        else {
            const crosstables = doc.querySelectorAll('.crosstable');
            crosstables.forEach(table => {
                const rows = Array.from(table.querySelectorAll('tbody tr'));
                rows.forEach(row => {
                    const rankVal = row.cells[row.cells.length - 1]?.innerText.trim();
                    if (rankVal && !isNaN(rankVal)) {
                        // 🌟 修复：积分表抓取时不再强加“冠军”文字，直接用数字
                        let rankTitle = `第${rankVal}名`; 
                        let fullName = row.cells[0].innerText.replace(/^\d+\.\s*/, '').trim();
                        extractedStandings.push({ rank: rankTitle, fullName: fullName });
                    }
                });
            });
        }

        // 🌟 统一对所有提取到的名次进行绝对排序，兼容汉字和数字
        extractedStandings.sort((a, b) => {
            const getRankNum = (str) => {
                if (str.includes('冠军')) return 1;
                if (str.includes('亚军')) return 2;
                if (str.includes('季军')) return 3;
                if (str.includes('四')) return 4;
                if (str.includes('五')) return 5;
                if (str.includes('六')) return 6;
                if (str.includes('七')) return 7;
                if (str.includes('八')) return 8;
                const num = parseInt(str.replace(/\D/g, ''));
                return isNaN(num) ? 99 : num; 
            };
            return getRankNum(a.rank) - getRankNum(b.rank);
        });

        // 如果提取到了名次，就生成表格
        if (extractedStandings.length > 0) {
            bookHtml += `
                <div style="margin-bottom: 40px; page-break-inside: avoid;">
                    <h3 style="font-size: 20px; border-left: 8px solid #333; padding-left: 15px; margin-bottom: 15px;">
                        组别：${t.sportName}
                    </h3>
                    <table style="width: 100%; border-collapse: collapse; text-align: center;">
                        <thead>
                            <tr style="background: #f2f2f2;">
                                <th style="border: 1px solid #000; padding: 8px; width: 40%;">姓名</th>
                                <th style="border: 1px solid #000; padding: 8px; width: 20%;">名次</th>
                                <th style="border: 1px solid #000; padding: 8px; width: 40%;">单位</th>
                            </tr>
                        </thead>
                        <tbody>`;

            extractedStandings.forEach(item => {
                // 抹除多余换行符
                const cleanFullName = item.fullName.replace(/[\r\n]+/g, '').replace(/\s+/g, ' ').trim();
                
                // 拆分姓名和单位
                const nameMatch = cleanFullName.match(/^(.*?)[\(（](.*?)[\)）]$/);
                const name = nameMatch ? nameMatch[1].trim() : cleanFullName;
                const unit = nameMatch ? nameMatch[2].trim() : "-";

                // 🌟🌟🌟 核心修复：终极格式化拦截器
                // 将所有可能的旧数据（如 🥇冠军、第四名、第5名）强制转换为统一的 "第X名"
                let displayRank = "";
                if (item.rank.includes('冠军')) displayRank = "第1名";
                else if (item.rank.includes('亚军')) displayRank = "第2名";
                else if (item.rank.includes('季军')) displayRank = "第3名";
                else if (item.rank.includes('四')) displayRank = "第4名";
                else if (item.rank.includes('五')) displayRank = "第5名";
                else if (item.rank.includes('六')) displayRank = "第6名";
                else if (item.rank.includes('七')) displayRank = "第7名";
                else if (item.rank.includes('八')) displayRank = "第8名";
                else {
                    // 如果已经是数字类型，直接提取数字并拼接
                    let num = item.rank.replace(/\D/g, '');
                    displayRank = num ? `第${num}名` : item.rank;
                }

                bookHtml += `
                    <tr>
                        <td style="border: 1px solid #000; padding: 8px;">${name}</td>
                        <td style="border: 1px solid #000; padding: 8px; font-weight: bold;">${displayRank}</td>
                        <td style="border: 1px solid #000; padding: 8px;">${unit}</td>
                    </tr>`;
            });

            bookHtml += `</tbody></table></div>`;
        }
    });

    bookHtml += `</div>`; // 结束封面页

   // --- 构建后续页（详细积分和对阵图） ---
    ids.forEach((id, index) => {  
        const t = allTournaments[id];
        const doc = parser.parseFromString(t.html, 'text/html');

        // 🌟 核心修复：判断是否是最后一个项目。如果是，就不加强制换行符
        const pageBreakStyle = (index === ids.length - 1) ? "" : "page-break-after: always;";

        bookHtml += `
            <div style="${pageBreakStyle} padding: 20px;">
                <h2 style="font-size: 24px; color: #1a73e8; border-bottom: 2px solid #1a73e8; padding-bottom: 10px; margin-bottom: 30px;">
                    项目：${t.sportName} 详细成绩
                </h2>`;

        // 提取循环赛积分表
        const crosstables = doc.querySelectorAll('.group-container');
        crosstables.forEach(group => {
            const table = group.querySelector('.crosstable');
            if (table) {
                table.querySelectorAll('td').forEach(td => td.removeAttribute('contenteditable'));
                // 🌟 核心修复：加上 page-break-inside: avoid，强行保证表格作为一个整体打印
                bookHtml += `<div style="margin-bottom: 30px; page-break-inside: avoid; break-inside: avoid;">
                                <h4 style="margin-bottom:10px;">${group.querySelector('h3')?.innerText || '积分表'}</h4>
                                ${table.outerHTML}
                             </div>`;
            }
        });

        const brackets = doc.querySelectorAll('.bracket-container');
        brackets.forEach(bracket => {
            bracket.querySelectorAll('.score-inputs, .court-tag, .court-info').forEach(el => el.remove());
            bookHtml += `<div style="margin-top:20px;">${bracket.outerHTML}</div>`;
        });

        bookHtml += `</div>`;
    });

    bookHtml += `</div>`;

    const originalContent = ui.results.innerHTML;
    ui.results.innerHTML = bookHtml;

    setTimeout(() => {
        window.print();
        ui.results.innerHTML = originalContent;
    }, 500);
}

/**
 * 提取所有项目的已编排赛程，生成并打印全局总表（增加场序）
 */
function exportGlobalSchedule() {
    const ids = Object.keys(allTournaments);
    if (ids.length === 0) {
        alert("目前没有任何比赛项目。");
        return;
    }

    let allMatches = [];
    const parser = new DOMParser();

    // 1. 遍历所有项目提取数据
    ids.forEach(id => {
        const t = allTournaments[id];
        const doc = parser.parseFromString(t.html, 'text/html');
        
        // 查找所有带场次标签的单元格或对阵块
        const matchNodes = doc.querySelectorAll('.match, .schedule-table td');
        
        matchNodes.forEach(node => {
            const tag = node.querySelector('.court-tag, .court-info');
            if (tag && tag.innerText.includes('号场')) {
                const tagText = tag.innerText;
                
                // 正则解析：D1 09:00 | 1号场
                const dayMatch = tagText.match(/D(\d+)/);
                const timeMatch = tagText.match(/\d{2}:\d{2}/);
                const courtMatch = tagText.match(/(\d+)号场/);

                let p1 = "待定", p2 = "待定";
                if (node.classList.contains('match')) {
                    const tNode = node.querySelector('[data-slot="top"]');
                    const bNode = node.querySelector('[data-slot="bottom"]');
                    p1 = tNode ? tNode.innerText.trim() : "待定";
                    p2 = bNode ? bNode.innerText.trim() : "待定";
                } else {
                    const pNames = node.querySelectorAll('.p-name');
                    if (pNames.length >= 2) {
                        p1 = pNames[0].getAttribute('data-realname') || pNames[0].innerText.replace(/\s*\n\s*/g, '').trim();
                        p2 = pNames[1].getAttribute('data-realname') || pNames[1].innerText.replace(/\s*\n\s*/g, '').trim();
                    } else {
                        const names = node.innerText.split(/VS/i);
                        if(names.length >= 2) {
                            p1 = names[0].split('\n')[0].trim();
                            p2 = names[1].split('\n')[0].trim();
                        }
                    }
                }

                if (timeMatch && courtMatch) {
                    allMatches.push({
                        day: dayMatch ? parseInt(dayMatch[1]) : 1,
                        time: timeMatch[0],
                        court: parseInt(courtMatch[1]),
                        project: t.sportName,
                        matchup: `${p1} VS ${p2}`
                    });
                }
            }
        });
    });

    if (allMatches.length === 0) {
        alert("未发现已编排的赛程，请先进行‘全局编排’后再导出。");
        return;
    }

    // 2. 排序：天数 -> 时间 -> 场地
    allMatches.sort((a, b) => {
        if (a.day !== b.day) return a.day - b.day;
        if (a.time !== b.time) return a.time.localeCompare(b.time);
        return a.court - b.court;
    });

    // 3. 构造全局表格 HTML（增加场序 i+1）
    let tableRows = allMatches.map((m, i) => `
        <tr>
            <td style="width:60px">D${m.day}</td>
            <td style="width:50px; font-weight:bold; color:#666;">${i + 1}</td>
            <td style="font-weight:bold; width:80px">${m.time}</td>
            <td style="width:80px">${m.court}号场</td>
            <td style="color:#27ae60; width:120px">${m.project}</td>
            <td style="text-align:left; padding-left:15px;">${m.matchup}</td>
        </tr>
    `).join('');

    let globalTableHtml = `
        <div id="global-print-view">
            <h1 style="text-align:center; margin-bottom:20px;">赛事总日程表</h1>
            <table class="data-table">
                <thead>
                    <tr>
                        <th>日期</th>
                        <th>场序</th>
                        <th>时间</th>
                        <th>场地</th>
                        <th>比赛项目</th>
                        <th>对阵详情</th>
                    </tr>
                </thead>
                <tbody>${tableRows}</tbody>
            </table>
        </div>
    `;

    // 4. 临时替换并打印
    const originalContent = ui.results.innerHTML;
    ui.results.innerHTML = globalTableHtml;
    
    setTimeout(() => {
        window.print();
        ui.results.innerHTML = originalContent; 
    }, 100);
}
// 初始化时从本地读取赛事名称
document.addEventListener('DOMContentLoaded', () => {
    const savedName = localStorage.getItem('globalTournamentName') || "体育赛事管理系统";
    const input = document.getElementById('global-tournament-title');
    if (input) {
        input.value = savedName;
        // 等待 socket 连接后同步
        setTimeout(() => syncTournamentName(savedName), 1000);
    }
});

function syncTournamentName(name) {
    localStorage.setItem('globalTournamentName', name);
    if (socket && socket.connected) {
        socket.emit('set_tournament_name', name);
    }
}
function toggleMobileSidebar() {
    const sidebar = document.querySelector('.sidebar');
    const overlay = document.getElementById('sidebarOverlay');
    sidebar.classList.toggle('mobile-active');
    overlay.classList.toggle('active');
}

// 优化：点击侧边栏菜单后自动隐藏（手机端）
document.querySelectorAll('.menu-item').forEach(item => {
    item.addEventListener('click', () => {
        if (window.innerWidth <= 768) {
            toggleMobileSidebar();
        }
    });
});
init();
</script>
</body>
</html>
